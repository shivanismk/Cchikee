<!-- new arrival section starts here  -->
<section class="new-arrival bg-light py-5">
  <div class="container">
    <div class="section-header text-center mb-5" data-aos="fade-up">
      <h6 class="text-uppercase text-primary">Collections</h6>
      <h2 class="section-title">Latest Arrival</h2>
      <div class="divider mx-auto"></div>
    </div>
    <div class="row g-4" data-aos="fade-up" data-aos-delay="500" data-aos-duration="2000">
      <div class="col-lg-12">

        <owl-carousel-o [options]="customOptions" *ngIf="newArrivals.length">
          <ng-template carouselSlide *ngFor="let product of newArrivals">
            <div class="product-card">
              <div class="product-img">
                <img
                  [src]="product.images?.length ? getImageUrl(product.images[0].image_url) : 'assets/images/no-image.png'"
                  [alt]="product.name" class="img-fluid">
                <span class="badge badge-sale" *ngIf="product.is_new_arrival">New</span>
                <span class="badge badge-sale" *ngIf="product.is_trending && !product.is_new_arrival">Trending</span>
                <div class="product-actions">
                  <button class="action-btn" title="Add to Cart">
                    <i class="bi bi-bag-plus"></i>
                  </button>
                  <button class="action-btn" title="Add to Wishlist">
                    <i class="bi bi-heart"></i>
                  </button>
                  <button class="action-btn" title="Quick View">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="product-content">
                <span class="product-category">{{ product.levelOneCategory?.name || 'General' }}</span>
                <h3 class="product-title">
                  <a href="javascript:void(0)" [routerLink]="['/product', product.id]">{{ product.name }}</a>
                </h3>
                <div class="product-rating">
                  <i class="bi bi-star-fill"></i>
                  <i class="bi bi-star-fill"></i>
                  <i class="bi bi-star-fill"></i>
                  <i class="bi bi-star-half"></i>
                  <i class="bi bi-star"></i>
                  <span class="rating-count">(4.2)</span>
                </div>
                <div class="product-price">
                  <span class="current-price">₹{{ product.price }}</span>
                </div>
                <!-- <div class="mt-2 d-flex justify-content-between align-items-center">

                  <div class="product-colors">
                    <div class="color-swatch active" title="red" style="background-color: red;">
                    </div>
                    <div class="color-swatch" title="green" style="background-color: green;"></div>
                    <div class="color-swatch" title="yellow" style="background-color: yellow;">
                    </div>
                    <div class="color-swatch" title="pink" style="background-color: pink;"></div>
                  </div>
                  <div class="product-sizes">
                    <div class="size-options active"> L</div>
                    <div class="size-options"> M</div>
                    <div class="size-options"> XL</div>
                    <div class="size-options"> XXL</div>
                  </div>

                </div> -->
              </div>
            </div>
          </ng-template>
        </owl-carousel-o>

        <!-- Empty state -->
        <div *ngIf="!newArrivals.length" class="text-center py-5 text-muted">
          <i class="bi bi-box-seam fs-1 d-block mb-2"></i>
          No new arrivals at the moment.
        </div>

      </div>
    </div>
  </div>
</section>
